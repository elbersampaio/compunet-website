<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Mobiliza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0B1120;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(37,99,235,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 80% 70%, rgba(6,182,212,0.05) 0%, transparent 50%);
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 40px 32px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563EB, #06B6D4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(37,99,235,0.3);
    }
    .login-logo .icon svg { width: 28px; height: 28px; fill: #fff; }
    .login-logo h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .login-logo p {
      font-size: 14px;
      color: #64748B;
      margin: 4px 0 0;
    }
    .form-floating {
      margin-bottom: 16px;
    }
    .form-floating > .form-control {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #fff;
      padding: 16px 16px 8px;
      height: auto;
      font-size: 15px;
    }
    .form-floating > .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .form-floating > .form-control::placeholder { color: #475569; }
    .form-floating > label {
      color: #64748B;
      padding: 12px 16px;
      font-size: 14px;
    }
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
      transform: scale(0.8) translateY(-8px) translateX(-4px);
      color: #94A3B8;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563EB, #1d4ed8);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(37,99,235,0.35); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert-msg {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-msg.show { display: block; }
    .alert-msg.error { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.2); color: #fca5a5; }
    .alert-msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
    .spinner-border-sm { width: 18px; height: 18px; border-width: 2px; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
    }
    .login-footer a {
      color: #64748B;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .login-footer a:hover { color: #94A3B8; }
    .login-footer .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .role-info {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .role-badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 100px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #64748B;
    }
    .role-badge.admin { border-color: rgba(239,68,68,0.3); color: #fca5a5; }
    .role-badge.teacher { border-color: rgba(37,99,235,0.3); color: #93c5fd; }
    .role-badge.student { border-color: rgba(34,197,94,0.3); color: #86efac; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1>Mobiliza</h1>
        <p>Plataforma de Inteligência Eleitoral</p>
      </div>

      <div id="serverStatus" style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:16px;font-size:13px;color:#64748B;">
        <span id="statusDot" style="width:8px;height:8px;border-radius:50%;background:#64748B;display:inline-block;"></span>
        <span id="statusText">Verificando servidor...</span>
      </div>

      <div class="alert-msg" id="alertMsg"></div>

      <div id="loginView">
        <form id="loginForm" autocomplete="off">
          <div class="form-floating">
            <input type="email" class="form-control" id="email" placeholder="seu@email.com" required autocomplete="email"/>
            <label for="email">Email</label>
          </div>
          <div class="form-floating">
            <input type="password" class="form-control" id="senha" placeholder="Sua senha" required autocomplete="current-password"/>
            <label for="senha">Senha</label>
          </div>
          <button type="submit" class="btn-login" id="btnLogin">
            Entrar
          </button>
        </form>

        <div class="role-info">
          <span class="role-badge admin">Admin</span>
          <span class="role-badge teacher">Teacher</span>
          <span class="role-badge student">Student</span>
        </div>

        <div class="login-footer">
          <a href="#" id="showRegister" class="back-link" style="display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Criar conta
          </a>
          <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
            Voltar ao site
          </a>
        </div>
      </div>

      <div id="registerView" style="display:none;">
        <form id="registerForm" autocomplete="off">
          <div class="form-floating">
            <input type="text" class="form-control" id="regNome" placeholder="Seu nome" required autocomplete="name"/>
            <label for="regNome">Nome completo</label>
          </div>
          <div class="form-floating">
            <input type="email" class="form-control" id="regEmail" placeholder="seu@email.com" required autocomplete="email"/>
            <label for="regEmail">Email</label>
          </div>
          <div class="form-floating">
            <input type="password" class="form-control" id="regSenha" placeholder="Sua senha" required autocomplete="new-password"/>
            <label for="regSenha">Senha (mín. 6 caracteres)</label>
          </div>
          <button type="submit" class="btn-login" id="btnRegister">
            Criar conta
          </button>
        </form>

        <div class="login-footer">
          <a href="#" id="showLogin" class="back-link" style="display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4m-5-4l5-5-5-5m5 5H3"/></svg>
            Já tenho conta
          </a>
          <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
            Voltar ao site
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const loginView = document.getElementById('loginView');
    const registerView = document.getElementById('registerView');
    const form = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const btn = document.getElementById('btnLogin');
    const btnRegister = document.getElementById('btnRegister');
    const alertMsg = document.getElementById('alertMsg');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    function showAlert(msg, type) {
      alertMsg.textContent = msg;
      alertMsg.className = 'alert-msg show ' + type;
    }

    function hideAlert() {
      alertMsg.className = 'alert-msg';
    }

    function setServerStatus(connected) {
      if (connected) {
        statusDot.style.background = '#22c55e';
        statusText.textContent = 'Servidor conectado';
        statusText.style.color = '#86efac';
      } else {
        statusDot.style.background = '#ef4444';
        statusText.textContent = 'Servidor offline';
        statusText.style.color = '#fca5a5';
      }
    }

    async function checkServer() {
      statusDot.style.background = '#f59e0b';
      statusText.textContent = 'Verificando servidor...';
      statusText.style.color = '#fbbf24';
      try {
        const res = await fetch(API + '/health', { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          setServerStatus(true);
          hideAlert();
          return true;
        }
      } catch (_) {}
      setServerStatus(false);
      return false;
    }

    const MAX_RETRIES = 3;

    async function reconnectWithBackoff() {
      for (let i = 0; i < MAX_RETRIES; i++) {
        const wait = Math.min(1000 * Math.pow(2, i), 5000);
        await new Promise(r => setTimeout(r, wait));
        const ok = await checkServer();
        if (ok) return true;
      }
      return false;
    }

    document.addEventListener('DOMContentLoaded', checkServer);

    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      loginView.style.display = 'none';
      registerView.style.display = 'block';
      hideAlert();
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      registerView.style.display = 'none';
      loginView.style.display = 'block';
      hideAlert();
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('regNome').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const senha = document.getElementById('regSenha').value;

      if (!nome || !email || !senha) {
        showAlert('Preencha todos os campos.', 'error');
        return;
      }
      if (senha.length < 6) {
        showAlert('A senha deve ter no mínimo 6 caracteres.', 'error');
        return;
      }

      btnRegister.disabled = true;
      btnRegister.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Criando...';
      hideAlert();

      try {
        const res = await fetch(API + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.erro || 'Erro ao criar conta.', 'error');
          btnRegister.disabled = false;
          btnRegister.innerHTML = 'Criar conta';
          return;
        }

        localStorage.setItem('mobiliza_token', data.token);
        localStorage.setItem('mobiliza_usuario', JSON.stringify(data.usuario));
        window.location.href = 'pages/student/dashboard.html';
      } catch (err) {
        showAlert('Erro de conexão com o servidor. Tente novamente.', 'error');
        btnRegister.disabled = false;
        btnRegister.innerHTML = 'Criar conta';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!email || !senha) {
        showAlert('Preencha todos os campos.', 'error');
        return;
      }

      const online = await checkServer();
      if (!online) {
        showAlert('Servidor indisponível. Tentando reconectar...', 'error');
        const reconectou = await reconnectWithBackoff();
        if (!reconectou) {
          showAlert(
            'Erro de conexão com o servidor. Certifique-se de que o servidor está rodando.\n' +
            ' rode: cd server && npm start  ou  clique duas vezes em iniciar-servidor.bat',
            'error'
          );
          return;
        }
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Entrando...';
      hideAlert();

      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.erro || 'Erro ao fazer login.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'Entrar';
          return;
        }

        localStorage.setItem('mobiliza_token', data.token);
        localStorage.setItem('mobiliza_usuario', JSON.stringify(data.usuario));

        const destino = {
          'admin': 'pages/admin/dashboard.html',
          'teacher': 'pages/teacher/dashboard.html',
          'student': 'pages/student/dashboard.html'
        };

        window.location.href = destino[data.usuario.perfil] || 'index.html';
      } catch (err) {
        showAlert('Erro de conexão com o servidor. Tente novamente.', 'error');
        checkServer();
        btn.disabled = false;
        btn.innerHTML = 'Entrar';
      }
    });
  </script>
</body>
</html>
