<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel do Professor | Mobiliza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #0F172A; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: #0F172A; color: #fff; z-index: 100;
      display: flex; flex-direction: column;
    }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; margin: 0; }
    .sidebar-header span { font-size: 12px; color: #64748B; }
    .sidebar-nav { flex: 1; padding: 12px; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 10px;
      color: #94A3B8; text-decoration: none; font-size: 14px; font-weight: 500;
      transition: all 0.15s; margin-bottom: 2px;
    }
    .sidebar-nav a:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .sidebar-nav a.active { background: rgba(37,99,235,0.12); color: #60A5FA; }
    .sidebar-nav a .material-symbols-outlined { font-size: 20px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-footer .user-info { display: flex; align-items: center; gap: 10px; }
    .sidebar-footer .avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg,#2563EB,#06B6D4);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
    }
    .sidebar-footer .user-name { font-size: 13px; font-weight: 600; color: #fff; }
    .sidebar-footer .user-role { font-size: 11px; color: #64748B; }
    .main { margin-left: 260px; min-height: 100vh; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; background: #fff; border-bottom: 1px solid #E2E8F0;
    }
    .topbar h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; margin: 0; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-right .badge-role {
      font-size: 11px; padding: 4px 12px; border-radius: 100px;
      background: rgba(37,99,235,0.1); color: #2563EB; font-weight: 600;
    }
    .btn-logout {
      padding: 8px 16px; border-radius: 10px; border: 1px solid #E2E8F0;
      background: #fff; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-logout:hover { background: #F1F5F9; }
    .content { padding: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: #fff; border-radius: 16px; padding: 20px 24px;
      border: 1px solid #E2E8F0;
    }
    .stat-card .stat-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
    }
    .stat-card .stat-number { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; }
    .stat-card .stat-label { font-size: 13px; color: #64748B; }
    .curso-card {
      background: #fff; border-radius: 16px; overflow: hidden;
      border: 1px solid #E2E8F0; transition: all 0.2s; height: 100%;
    }
    .curso-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    .curso-card .card-body { padding: 20px; }
    .curso-card .card-body h5 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .curso-card .card-body p { font-size: 13px; color: #64748B; margin-bottom: 8px; }
    .curso-card .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #F8FAFC; border-top: 1px solid #E2E8F0;
      font-size: 12px; color: #64748B;
    }
    .btn-primary-custom {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: #0F172A; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary-custom:hover { background: #1e293b; }
    .modal-content { border-radius: 16px; border: none; }
    .modal-header { border-bottom: 1px solid #E2E8F0; padding: 20px 24px; }
    .modal-body { padding: 24px; }
    .modal-footer { border-top: 1px solid #E2E8F0; padding: 16px 24px; }
    .form-control-custom {
      border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 10px 14px;
      font-size: 14px; transition: border-color 0.2s;
    }
    .form-control-custom:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .sidebar-toggle { display: block !important; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Mobiliza</h2>
      <span>Professor</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="active"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
      <a href="#"><span class="material-symbols-outlined">school</span> Meus Cursos</a>
      <a href="#"><span class="material-symbols-outlined">people</span> Alunos</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="avatarInicial">P</div>
        <div>
          <div class="user-name" id="userNome">Carregando...</div>
          <div class="user-role">teacher</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="sidebar-toggle" style="display:none;background:none;border:none;" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <h3>Dashboard do Professor</h3>
      </div>
      <div class="topbar-right">
        <button class="btn-primary-custom" style="padding:8px 16px;font-size:13px;" onclick="abrirModalCurso()">+ Novo Curso</button>
        <span class="badge-role">Professor</span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(37,99,235,0.1);color:#2563EB;"><span class="material-symbols-outlined">school</span></div>
          <div class="stat-number" id="totalCursos">0</div>
          <div class="stat-label">Cursos Criados</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(34,197,94,0.1);color:#16a34a;"><span class="material-symbols-outlined">people</span></div>
          <div class="stat-number" id="totalAlunos">0</div>
          <div class="stat-label">Alunos Matriculados</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(249,115,22,0.1);color:#ea580c;"><span class="material-symbols-outlined">play_circle</span></div>
          <div class="stat-number" id="totalAulas">0</div>
          <div class="stat-label">Total de Aulas</div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="font-family:'Space Grotesk',sans-serif;margin:0;">Meus Cursos</h4>
      </div>
      <div class="row g-4" id="cursosContainer"></div>
    </div>
  </div>

  <div class="modal fade" id="modalCurso" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" style="font-family:'Space Grotesk',sans-serif;font-weight:600;" id="modalCursoTitulo">Novo Curso</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formCurso">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label" style="font-size:13px;font-weight:600;color:#475569;">Título do Curso</label>
              <input type="text" class="form-control form-control-custom" id="cursoTitulo" required placeholder="Ex: Estratégia de Campanha"/>
            </div>
            <div class="mb-3">
              <label class="form-label" style="font-size:13px;font-weight:600;color:#475569;">Descrição</label>
              <textarea class="form-control form-control-custom" id="cursoDescricao" rows="3" placeholder="Descrição do curso..."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label" style="font-size:13px;font-weight:600;color:#475569;">Categoria</label>
              <input type="text" class="form-control form-control-custom" id="cursoCategoria" placeholder="Ex: Mobilização, Comunicação"/>
            </div>
            <input type="hidden" id="cursoId"/>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:10px;font-size:14px;">Cancelar</button>
            <button type="submit" class="btn btn-primary-custom" id="btnSalvarCurso">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = '/api';

    function getToken() { return localStorage.getItem('mobiliza_token'); }
    function getUsuario() { return JSON.parse(localStorage.getItem('mobiliza_usuario') || '{}'); }

    async function apiFetch(url, opts = {}) {
      const token = getToken();
      if (!token) { window.location.href = '../../login.html'; return; }
      opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
      const res = await fetch(API + url, opts);
      if (res.status === 401) { localStorage.clear(); window.location.href = '../../login.html'; }
      return res.json();
    }

    function logout() {
      apiFetch('/auth/logout', { method: 'POST' }).finally(() => {
        localStorage.clear();
        window.location.href = '../../login.html';
      });
    }

    const modalCurso = new bootstrap.Modal(document.getElementById('modalCurso'));

    function abrirModalCurso(curso) {
      document.getElementById('modalCursoTitulo').textContent = curso ? 'Editar Curso' : 'Novo Curso';
      document.getElementById('cursoId').value = curso ? curso.id : '';
      document.getElementById('cursoTitulo').value = curso ? curso.titulo : '';
      document.getElementById('cursoDescricao').value = curso ? (curso.descricao || '') : '';
      document.getElementById('cursoCategoria').value = curso ? (curso.categoria || '') : '';
      modalCurso.show();
    }

    document.getElementById('formCurso').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('cursoId').value;
      const data = {
        titulo: document.getElementById('cursoTitulo').value,
        descricao: document.getElementById('cursoDescricao').value,
        categoria: document.getElementById('cursoCategoria').value
      };

      if (id) {
        await apiFetch('/cursos/' + id, { method: 'PUT', body: JSON.stringify(data) });
      } else {
        await apiFetch('/cursos', { method: 'POST', body: JSON.stringify(data) });
      }
      modalCurso.hide();
      carregarDashboard();
    });

    async function excluirCurso(id) {
      if (!confirm('Excluir este curso?')) return;
      await apiFetch('/cursos/' + id, { method: 'DELETE' });
      carregarDashboard();
    }

    async function carregarDashboard() {
      const usuario = getUsuario();
      document.getElementById('userNome').textContent = usuario.nome || 'Professor';
      document.getElementById('avatarInicial').textContent = (usuario.nome || 'P')[0];

      const cursos = await apiFetch('/cursos');
      if (!cursos || !Array.isArray(cursos)) return;

      const totalCursos = cursos.length;
      const totalAulas = cursos.reduce((s, c) => s + (c.total_aulas || 0), 0);

      document.getElementById('totalCursos').textContent = totalCursos;
      document.getElementById('totalAlunos').textContent = cursos.reduce((s, c) => s + (c.total_alunos || 0), 0) || '—';
      document.getElementById('totalAulas').textContent = totalAulas;

      const container = document.getElementById('cursosContainer');

      if (cursos.length === 0) {
        container.innerHTML = `
          <div class="col-12 text-center py-5" style="color:#94A3B8;">
            <span class="material-symbols-outlined" style="font-size:48px;margin-bottom:16px;">school</span>
            <h5 style="color:#475569;">Nenhum curso criado</h5>
            <p style="font-size:14px;">Clique em "+ Novo Curso" para começar.</p>
          </div>`;
        return;
      }

      container.innerHTML = cursos.map(c => `
        <div class="col-md-6 col-lg-4">
          <div class="curso-card">
            <div class="card-body">
              <h5>${c.titulo}</h5>
              <p>${c.descricao ? c.descricao.substring(0, 80) : 'Sem descrição'}</p>
              <div style="font-size:12px;color:#64748B;">
                <span>${c.total_aulas || 0} aulas</span>
                ${c.categoria ? ' · <span>' + c.categoria + '</span>' : ''}
              </div>
            </div>
            <div class="card-footer">
              <span>${new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
              <div>
                <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;font-size:12px;padding:4px 10px;" onclick="abrirModalCurso(${JSON.stringify(c).replace(/"/g, "'")})">Editar</button>
                <button class="btn btn-sm btn-outline-danger" style="border-radius:8px;font-size:12px;padding:4px 10px;margin-left:4px;" onclick="excluirCurso(${c.id})">Excluir</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', carregarDashboard);
  </script>
</body>
</html>
